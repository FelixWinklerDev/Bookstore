<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookstore</title>
  <link rel="stylesheet" href="./styles/global.css">
  <link rel="stylesheet" href="./styles/assets.css">
  <link rel="stylesheet" href="./styles/template.css">
  <link rel="stylesheet" href="./styles/fonts.css">
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="./assets/icons/book-icon.png" type="image/x-icon">
  <script src="./scripts/templates.js"></script>
  <script src="script.js"></script>
</head>
<body onload="renderBooks()">
  <header class="header-wrapper">
    <section class="header-wrapper">
      <img class="book-icon" src="./assets/icons/book-icon.png" alt="Logo">
      <h1>Bookstore</h1>
      <p>your favorite books with one click</p>
    </section>
  </header>
  <main id="content">
    <div id="mother-div">
      <section>
        <h2>${books[index].name}</h2>
      </section>
      <div class="seperator"></div>
      <section>
        <img class="showcase-pic" src="./assets/icons/openclipart-vectors-book-2022461_640.png" alt="Buchkarikatur">
      </section>
      <div class="seperator"></div>
      <section class="price-like-flex">
        <p>${books.price[index] + ' €'}</p>
        <section class="like-flex">
          <p>${books.likes[index]}</p>
          <button id="like-btn" onclick="liked"><img class="like" src="./assets/icons/favorite.png" alt=""></button>
        </section>
      </section>
      <div class="seperator"></div>
      <section>
        <table>
          <tr class="table-flex">
            <th>Author:</th>
            <td>${books.author[index]}</td>
          </tr>
          <tr class="table-flex">
            <th>Veröffentluchungsjahr:</td>
            <td>${books.publishedYear[index]}</td>
          </tr>
          <tr class="table-flex">
            <th>Genre:</td>
            <td>${books.genre[index]}</td>
          </tr>
        </table>
      </section>
      <div class="seperator"></div>
      <section class="comment-flex">
        <input id="comment" type="text">
        <button id="submit-comment"><img class="paper-plane"
            src="./assets/icons/openclipart-vectors-paper-plane-147602_640.png" alt="papierflieger"></button>
      </section>
    </div>
  </main>
</body>
</html>
